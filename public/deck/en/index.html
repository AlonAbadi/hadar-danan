document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"85c806a1-5e0f-4f5c-bedf-deb528fd5335\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"640ec91f-7c72-4404-b931-e9f61057db2e\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9f27a7d7-d073-4aab-ace3-d76cc45b72ee\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"e5de132f-b9fd-4e99-bd71-0fbccf04a268\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"e17611d4-47f0-4e3c-a979-e3af8209114e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"19590676-4fd5-499b-8c5c-7930c1f1f73d\"><\u002Fscript>\n<style>\n  :root {\n    --ink: #141110;\n    --ink-2: #3f3733;\n    --ink-3: #8a7d72;\n    --cream: #f3ecdf;\n    --cream-2: #e8dfcd;\n    --paper: #faf4e8;\n    --gold: #c9964a;\n    --gold-deep: #9a6e28;\n    --rule: rgba(20,17,16,0.14);\n\n    --t-display: 132px;\n    --t-title:   72px;\n    --t-subtitle:44px;\n    --t-body:    32px;\n    --t-small:   26px;\n    --t-micro:   24px;\n\n    --pad-x: 110px;\n    --pad-top: 80px;\n    --pad-bottom: 70px;\n  }\n\n  html, body {\n    margin: 0; padding: 0;\n    background: #000;\n    font-family: 'Assistant', -apple-system, sans-serif;\n    color: var(--ink);\n  }\n\n  deck-stage > section {\n    background: var(--paper);\n    color: var(--ink);\n    font-family: 'Assistant', sans-serif;\n    font-size: var(--t-body);\n    line-height: 1.4;\n    overflow: hidden;\n    font-weight: 400;\n  }\n\n  /* ——— page chrome: wordmark, markers, confidential ——— */\n  .chrome-top {\n    position: absolute;\n    top: 48px;\n    left: var(--pad-x);\n    right: var(--pad-x);\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: var(--t-micro);\n    letter-spacing: 0.14em;\n    color: var(--ink-3);\n    text-transform: uppercase;\n  }\n  .wordmark {\n    font-family: 'Fraunces', serif;\n    font-size: 34px;\n    font-weight: 500;\n    letter-spacing: -0.02em;\n    color: var(--ink);\n    text-transform: none;\n    display: inline-flex;\n    align-items: center;\n    gap: 14px;\n  }\n  .wordmark em {\n    font-style: italic;\n    font-weight: 400;\n    color: var(--gold);\n    margin-left: -0.08em;\n  }\n  .wordmark .bee-chrome {\n    width: 34px;\n    height: 34px;\n    object-fit: contain;\n    display: block;\n  }\n  .marker { font-weight: 500; }\n\n  .chrome-bottom {\n    position: absolute;\n    bottom: 40px;\n    left: var(--pad-x);\n    right: var(--pad-x);\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    letter-spacing: 0.16em;\n    color: var(--ink-3);\n    text-transform: uppercase;\n  }\n\n  .frame {\n    position: absolute;\n    inset: 140px var(--pad-x) 90px;\n    display: flex;\n    flex-direction: column;\n  }\n\n  /* ——— type tokens ——— */\n  .eyebrow {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: var(--t-micro);\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    font-weight: 500;\n  }\n  .display, .title, .serif {\n    font-family: 'Fraunces', serif;\n    font-weight: 300;\n    letter-spacing: -0.025em;\n    line-height: 1.02;\n    color: var(--ink);\n    margin: 0;\n  }\n  .display { font-size: var(--t-display); }\n  .title   { font-size: var(--t-title); line-height: 1.08; font-weight: 400; }\n  .subtitle {\n    font-family: 'Fraunces', serif;\n    font-weight: 300;\n    font-size: var(--t-subtitle);\n    line-height: 1.22;\n    letter-spacing: -0.012em;\n    color: var(--ink-2);\n    margin: 0;\n  }\n  .body {\n    font-size: var(--t-body);\n    line-height: 1.5;\n    color: var(--ink-2);\n    font-weight: 400;\n    max-width: 1200px;\n  }\n  .body strong { color: var(--ink); font-weight: 600; }\n  .small {\n    font-size: var(--t-small);\n    line-height: 1.45;\n    color: var(--ink-2);\n  }\n  .italic { font-style: italic; color: var(--gold-deep); font-weight: 300; }\n\n  .hr { height: 1px; background: var(--rule); width: 100%; }\n  .hr-gold { height: 1px; background: var(--gold); width: 100%; }\n\n  /* ——— layout atoms ——— */\n  .two-col {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 100px;\n    flex: 1;\n    align-items: start;\n  }\n  .stack-lg > * + * { margin-top: 36px; }\n  .stack-md > * + * { margin-top: 22px; }\n  .stack-sm > * + * { margin-top: 12px; }\n\n  /* ============== SLIDE 1 : COVER ============== */\n  .s-cover { background: var(--ink); position: relative; color: var(--cream); }\n  .s-cover .chrome-top,\n  .s-cover .chrome-bottom { color: rgba(243,236,223,0.75); z-index: 3; }\n  .s-cover .wordmark { color: var(--cream); }\n  .s-cover .wordmark em { color: var(--gold); }\n  .cover-video-bg {\n    position: absolute;\n    inset: 0;\n    overflow: hidden;\n    z-index: 0;\n  }\n  .cover-video-bg iframe {\n    position: absolute;\n    top: 50%;\n    left: 50%;\n    width: 177.78vh;\n    height: 100%;\n    min-width: 100%;\n    min-height: 56.25vw;\n    transform: translate(-50%, -50%);\n    border: 0;\n    pointer-events: none;\n    display: block;\n  }\n  .cover-scrim {\n    position: absolute;\n    inset: 0;\n    z-index: 1;\n    background:\n      linear-gradient(180deg, rgba(20,17,16,0.55) 0%, rgba(20,17,16,0.35) 35%, rgba(20,17,16,0.55) 75%, rgba(20,17,16,0.85) 100%);\n  }\n  .cover-hero {\n    position: absolute;\n    inset: 0;\n    z-index: 2;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    text-align: center;\n    padding: 0 var(--pad-x);\n    color: var(--cream);\n  }\n  .cover-bee {\n    width: 200px;\n    height: auto;\n    display: block;\n    margin-bottom: 36px;\n    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));\n  }\n  .cover-wordmark {\n    font-family: 'Fraunces', serif;\n    font-size: 260px;\n    line-height: 0.9;\n    letter-spacing: -0.05em;\n    font-weight: 300;\n    color: var(--cream);\n    margin: 0;\n  }\n  .cover-wordmark em {\n    font-style: italic;\n    font-weight: 300;\n    color: var(--gold);\n  }\n  .cover-sub {\n    font-family: 'Fraunces', serif;\n    font-weight: 300;\n    font-size: 42px;\n    color: rgba(243,236,223,0.82);\n    line-height: 1.3;\n    letter-spacing: -0.008em;\n    max-width: 1000px;\n    margin: 44px auto 0;\n  }\n\n  /* ============== SLIDE 2 : CONTEXT ============== */\n  .ctx-cols {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 140px;\n    flex: 1;\n    align-items: start;\n    margin-top: 40px;\n  }\n  .ctx-cols .col { padding-top: 0; }\n  .ctx-cols h3 {\n    font-family: 'Fraunces', serif;\n    font-size: 64px;\n    line-height: 1.08;\n    letter-spacing: -0.02em;\n    font-weight: 400;\n    margin: 0 0 36px;\n    max-width: 560px;\n  }\n  .ctx-cols .num {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: var(--t-micro);\n    color: var(--gold-deep);\n    letter-spacing: 0.14em;\n    margin-bottom: 28px;\n    text-transform: uppercase;\n  }\n  .ctx-cols p {\n    font-size: var(--t-body);\n    line-height: 1.5;\n    color: var(--ink-2);\n    margin: 0;\n    max-width: 580px;\n  }\n\n  /* ============== SLIDE 3 : PROBLEM ============== */\n  .problem-list {\n    margin: 72px 0 0;\n    max-width: 1500px;\n  }\n  .problem-list .row {\n    padding: 40px 0;\n    border-top: 1px solid var(--gold);\n    display: grid;\n    grid-template-columns: 80px 1fr;\n    align-items: baseline;\n    gap: 40px;\n  }\n  .problem-list .row:last-of-type {\n    border-bottom: 1px solid var(--gold);\n  }\n  .problem-list .row .idx {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: var(--t-micro);\n    color: var(--gold-deep);\n    letter-spacing: 0.14em;\n  }\n  .problem-list .row .t {\n    font-family: 'Fraunces', serif;\n    font-size: 54px;\n    font-weight: 300;\n    line-height: 1.15;\n    letter-spacing: -0.02em;\n    color: var(--ink);\n  }\n  .problem-foot {\n    margin-top: 48px;\n    font-size: var(--t-small);\n    color: var(--ink-3);\n    font-style: italic;\n  }\n\n  /* ============== SLIDE 4 : OPPORTUNITY ============== */\n  .opp {\n    display: grid;\n    grid-template-columns: 1.3fr 1fr;\n    gap: 100px;\n    flex: 1;\n    align-items: start;\n    margin-top: 48px;\n  }\n  .opp p {\n    font-size: var(--t-body);\n    line-height: 1.55;\n    color: var(--ink-2);\n    max-width: 700px;\n    margin: 0;\n  }\n  .vs {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    border: 1px solid var(--rule);\n  }\n  .vs > div { padding: 36px 32px; }\n  .vs .hd {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    margin-bottom: 22px;\n    font-weight: 500;\n  }\n  .vs .left  { border-right: 1px solid var(--rule); background: transparent; }\n  .vs .right { background: var(--cream); }\n  .vs ul { list-style: none; padding: 0; margin: 0; }\n  .vs li {\n    padding: 12px 0;\n    font-size: 26px;\n    color: var(--ink-2);\n    border-bottom: 1px dotted var(--rule);\n  }\n  .vs li:last-child { border-bottom: 0; }\n  .vs .right li { color: var(--ink); font-weight: 500; }\n  .vs .right .hd { color: var(--gold-deep); }\n\n  /* ============== SLIDE 5 : INTRODUCING ============== */\n  .s-intro { background: var(--cream); }\n  .intro-wrap {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    padding: 0 200px;\n    text-align: center;\n    align-items: center;\n  }\n  .intro-headline {\n    font-family: 'Fraunces', serif;\n    font-weight: 300;\n    font-size: 92px;\n    line-height: 1.08;\n    letter-spacing: -0.025em;\n    color: var(--ink);\n    max-width: 1500px;\n    margin: 0;\n  }\n  .intro-headline em {\n    font-style: italic;\n    color: var(--gold);\n    font-weight: 300;\n  }\n  .intro-sub {\n    font-family: 'Fraunces', serif;\n    font-weight: 300;\n    font-size: 38px;\n    line-height: 1.35;\n    color: var(--ink-2);\n    max-width: 1200px;\n    margin: 44px 0 0;\n    letter-spacing: -0.005em;\n  }\n  .chips {\n    display: flex;\n    gap: 20px;\n    justify-content: center;\n    margin-top: 64px;\n  }\n  .chip {\n    padding: 14px 28px;\n    border: 1px solid var(--ink);\n    border-radius: 999px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--ink);\n    background: transparent;\n  }\n  .chip.alt { background: var(--ink); color: var(--cream); border-color: var(--ink); }\n\n  /* ============== SLIDE 6 : HOW IT WORKS ============== */\n  .two-arm {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 80px;\n    flex: 1;\n    margin-top: 40px;\n  }\n  .arm {\n    border-top: 2px solid var(--ink);\n    padding-top: 32px;\n    display: flex;\n    flex-direction: column;\n  }\n  .arm .kind {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: var(--t-micro);\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--gold-deep);\n    margin-bottom: 18px;\n  }\n  .arm h3 {\n    font-family: 'Fraunces', serif;\n    font-weight: 400;\n    font-size: 56px;\n    letter-spacing: -0.02em;\n    line-height: 1.05;\n    margin: 0 0 32px;\n    color: var(--ink);\n  }\n  .arm h3 em { font-style: italic; color: var(--gold); font-weight: 300; }\n  .arm ul { list-style: none; padding: 0; margin: 0; }\n  .arm ul li {\n    padding: 16px 0;\n    border-bottom: 1px solid var(--rule);\n    font-size: 25px;\n    color: var(--ink-2);\n    line-height: 1.4;\n  }\n  .arm ul li strong { color: var(--ink); font-weight: 600; }\n  .arm .named {\n    margin-top: 24px;\n    padding-top: 20px;\n    font-family: 'Fraunces', serif;\n    font-style: italic;\n    font-size: 28px;\n    color: var(--gold-deep);\n    font-weight: 300;\n  }\n\n  /* Pipeline (A-to-Z turnkey steps) */\n  .pipeline {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 48px 60px;\n    margin-top: 40px;\n    flex: 1;\n  }\n  .pipeline .step {\n    border-top: 2px solid var(--ink);\n    padding-top: 24px;\n    display: flex;\n    flex-direction: column;\n  }\n  .pipeline .step .n {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 26px;\n    color: var(--gold-deep);\n    letter-spacing: 0.12em;\n    margin-bottom: 12px;\n  }\n  .pipeline .step .k {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    color: var(--ink-3);\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    margin-bottom: 18px;\n  }\n  .pipeline .step h4 {\n    font-family: 'Fraunces', serif;\n    font-weight: 400;\n    font-size: 38px;\n    letter-spacing: -0.015em;\n    line-height: 1.1;\ Fdiv>\n      <div>CONFIDENTIAL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2 · CONTEXT -->\n  <section data-label=\"Context\">\n    <div class=\"chrome-top\">\n      <div class=\"wordmark\"><img class=\"bee-chrome\" src=\"61ee1fec-a08d-4485-9c2a-c83c57c332ab\" alt=\"\">bee<em>good.<\u002Fem><\u002Fdiv>\n      <div class=\"marker\">02 / 14 · CONTEXT<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"frame\">\n      <div class=\"eyebrow\">The market shift, in two movements<\u002Fdiv>\n      <div class=\"hr\" style=\"margin: 28px 0 0;\"><\u002Fdiv>\n\n      <div class=\"ctx-cols\">\n        <div class=\"col\">\n          <div class=\"num\">ONE<\u002Fdiv>\n          <h3>The cold-lead economy is over.<\u002Fh3>\n          <p>Ads are taxed. Feeds are saturated. Generic funnels convert worse every quarter. Influencers, coaches, consultants, lawyers, doctors, aestheticians, mentors — every personal brand is paying more to reach people who trust less.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"col\">\n          <div class=\"num\">TWO<\u002Fdiv>\n          <h3>The signal economy is here.<\u002Fh3>\n          <p>The practices that win are the ones whose audience <em>self-qualifies<\u002Fem> before it ever speaks to them. A worldview, a method, a way in. Hot leads arrive already sold; the rest never arrive at all.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <div>beegood<\u002Fdiv>\n      <div>CONFIDENTIAL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3 · PROBLEM -->\n  <section data-label=\"Problem\">\n    <div class=\"chrome-top\">\n      <div class=\"wordmark\"><img class=\"bee-chrome\" src=\"61ee1fec-a08d-4485-9c2a-c83c57c332ab\" alt=\"\">bee<em>good.<\u002Fem><\u002Fdiv>\n      <div class=\"marker\">03 / 14 · THE PROBLEM<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"frame\">\n      <h2 class=\"title\" style=\"max-width: 1600px; font-size: 72px; font-weight: 300;\">\n        They can only sell what <em>they are.<\u002Fem><br>The content has stopped doing that.\n      <\u002Fh2>\n\n      <div class=\"problem-list\">\n        <div class=\"row\">\n          <div class=\"idx\">01<\u002Fdiv>\n          <div class=\"t\">Their creative follows trends, not their own frequency.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div class=\"idx\">02<\u002Fdiv>\n          <div class=\"t\">Their differentiation is buried under content that sounds like everyone else's.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div class=\"idx\">03<\u002Fdiv>\n          <div class=\"t\">Their leads arrive cold because nothing pre-qualifies them on the truth.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"problem-foot\" style=\"margin-bottom: 100px;\">The truth is an option, too — and it's the one that converts.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <div>beegood<\u002Fdiv>\n      <div>CONFIDENTIAL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4 · OPPORTUNITY -->\n  <section data-label=\"Opportunity\">\n    <div class=\"chrome-top\">\n      <div class=\"wordmark\"><img class=\"bee-chrome\" src=\"61ee1fec-a08d-4485-9c2a-c83c57c332ab\" alt=\"\">bee<em>good.<\u002Fem><\u002Fdiv>\n      <div class=\"marker\">04 / 14 · THE OPPORTUNITY<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"frame\">\n      <h2 class=\"title\" style=\"max-width: 1600px;\">\n        The market is ready for a new kind of partner.\n      <\u002Fh2>\n\n      <div class=\"opp\">\n        <p>\n          Agencies buy cold clicks. Funnel consultants sell decks. SaaS vendors ship tools. Video houses produce content.\n          No one sits with a personal brand long enough to build the full stack: <strong>narrative, method, funnel, platform<\u002Fstrong> — so that only hot leads ever land in the inbox.\n          <br><br>\n          That is the gap beegood occupies, for every practice whose n. Only pre-qualified, hot leads reach the practice.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <div class=\"n\">04<\u002Fdiv>\n          <div class=\"k\">Creative<\u002Fdiv>\n          <h4>Video that carries the <em>strategy.<\u002Fem><\u002Fh4>\n          <p>We take the creative to the next level by building the strategy into the content itself — brand-awareness films, CTA campaigns, product launches. Still human. Not AI. This is where we are the best.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <div class=\"n\">05<\u002Fdiv>\n          <div class=\"k\">CRM &amp; ops<\u002Fdiv>\n          <h4>A CRM and operating <em>spine.<\u002Fem><\u002Fh4>\n          <p>A CRM built for each atelier client. Online courses, live challenges, product delivery, member comms — all run through beegood. They never touch a dashboard they did not ask for.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <div class=\"n\">06<\u002Fdiv>\n          <div class=\"k\">Ongoing<\u002Fdiv>\n          <h4>They do their <em>real work.<\u002Fem><\u002Fh4>\n          <p>The personal brand shows up for the thing only they can do. We take care of the rest, A to Z, fast and accurate. That is the revolution — a single partner for every layer of the business.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"unifier\">First strategy. Then everything it needs to live in the market. One atelier. One brain. Turnkey.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <div>beegood<\u002Fdiv>\n      <div>CONFIDENTIAL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7 · PRODUCT -->\n  <section data-label=\"Product\">\n    <div class=\"chrome-top\">\n      <div class=\"wordmark\"><img class=\"bee-chrome\" src=\"61ee1fec-a08d-4485-9c2a-c83c57c332ab\" alt=\"\">bee<em>good.<\u002Fem><\u002Fdiv>\n      <div class=\"marker\">07 / 14 · PRODUCT<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fram ame\">Hadar Danan<\u002Fdiv>\n          <div class=\"disc\">Creative direction · Strategy · Public voice<\u002Fdiv>\n          <div class=\"bio\">Built a practice that reached 70,000+ followers and served 3,500+ clients across 80+ industries before beegood existed. The atelier's anchor client and the brand's outward face.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"member\">\n          <div class=\"role\">Co-founder<\u002Fdiv>\n          <div class=\"name\">Alon Abadi<\u002Fdiv>\n          <div class=\"disc\">Strategy · Business architecture · Technology · Product<\u002Fdiv>\n          <div class=\"bio\">Co-architect of beegood's strategy and business model. Designer and builder of beegood.online, the TrueSignal diagnosis engine, and the atelier's multi-tenant platform. Integrates aesthetic, strategic, and philosophical thinking into every layer of the system.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"team-foot\">Equal partners. Complementary disciplines. One atelier.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <div>beegood<\u002Fdiv>\n      <div>CONFIDENTIAL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · PARTNERSHIP -->\n  <section data-label=\"Partnership\">\n    <div class=\"chrome-top\">\n      <div class=\"wordmark\"><img class=\"bee-chrome\" src=\"61ee1fec-a08d-4485-9c2a-c83c57c332ab\" alt=\"\">bee<em>good.<\u002Fem><\u002Fdiv>\n      <div class=\"marker\">13 / 14 · PARTNERSHIP<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"frame\">\n      <h2 class=\"title\">Two conversations. One table.<\u002Fh2>\n\n      <div class=\"part\">\n        <div class=\"frame-card\">\n          <div class=\"kicker\">For strategic partners<\u002Fdiv>\n          <h3>We work with a small number of partners who extend the atelier's reach, into media, technology, education, and capital. Partnership with beegood is <em>long-form.<\u002Fem> We move slowly and we choose carefully.<\u002Fh3>\n        <\u002Fdiv>\n        <div class=\"frame-card alt\">\n          <div class=\"kicker\">For investors<\u002Fdiv>\n          <h3>beegood is not raising a traditional round. We are selectively opening conversations with investors whose presence extends the <em>craft,<\u002Fem> not just the cap table. If the fit is right, we will talk structure.<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <div>beegood<\u002Fdiv>\n      <div>CONFIDENTIAL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · NEXT STEPS -->\n  <section data-label=\"Next steps\" class=\"s-next\">\n    <div class=\"chrome-top\">\n      <div class=\"wordmark\"><img class=\"bee-chrome\" src=\"61ee1fec-a08d-4485-9c2a-c83c57c332ab\" alt=\"\">bee<em>good.<\u002Fem><\u002Fdiv>\n      <div class=\"marker\">14 / 14 · NEXT STEPS<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"next-wrap\">\n      <div class=\"big\">Let's find out if <em>this fits.<\u002Fem><\u002Fdiv>\n\n      <div class=\"contact\">\n        <div class=\"row\"><span class=\"k\">Hadar Danan<\u002Fspan><span>hadar@beegood.online<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Alon Abadi<\u002Fspan><span>alon@beegood.online<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Web<\u002Fspan><span>beegood.online<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-bottom\">\n      <div>beegood atelier · Tel Aviv · 2026<\u002Fdiv>\n      <div>CONFIDENTIAL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<div id=\"mobile-deck\" aria-hidden=\"true\"><\u002Fdiv>\n\n<script>\n  (function setupMobile() {\n    const MOBILE_MAX = 900;\n    const stage = document.querySelector('deck-stage');\n    const mount = document.getElementById('mobile-deck');\n    let cloned = false;\n\n    function isMobile() {\n      return Math.min(window.innerWidth, window.innerHeight) <= MOBILE_MAX\n          || window.matchMedia('(max-width: 900px)').matches;\n    }\n\n    function activate() {\n      document.body.classList.add('is-mobile');\n      if (!cloned) {\n        const sections = stage.querySelectorAll(':scope > section');\n        sections.forEach((s, i) => {\n          const c = s.cloneNode(true);\n          c.removeAttribute('data-screen-label');\n          c.removeAttribute('data-om-validate');\n          c.classList.add('m-slide');\n          c.setAttribute('data-m-idx', String(i + 1));\n          mount.appendChild(c);\n        });\n        cloned = true;\n      }\n      mount.setAttribute('aria-hidden', 'false');\n    }\n\n    function deactivate() {\n      document.body.classList.remove('is-mobile');\n      mount.setAttribute('aria-hidden', 'true');\n    }\n\n    function sync() { (isMobile() ? activate : deactivate)(); }\n\n    // Delay one tick so deck-stage finishes its initial slot collection.\n    setTimeout(sync, 50);\n    window.addEventListener('resize', sync);\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
